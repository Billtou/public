# --------------------------------------
# -            HARDWARE  勿動
# --------------------------------------
psram:
  mode: octal
  speed: 80MHz

i2c:
  - id: bus_a
    sda: 15
    scl: 6
    scan: true
    frequency: 400kHz

spi: {}

# ======================================================
# GC9503V FIXED COMPONENT（關鍵修正）
# ======================================================
# external_components:
#   - source:
#       type: git
#       url: https://github.com/Billtou/public
#       ref: main
#       path: dashboard_one_tw/my_components
#     components: [gc9503v]
#
#  將已修正的觸控屏的驅動放在本地端引用日後不受影響
#  /esphome/
#     |
#     | /my_components/
#            |
#            | /gc9503v/
#                 |
#                 |<驅動檔案放在這裡>

external_components:
  - source:
      type: local
      path: my_components
    components: [gc9503v]
    
display:
  - platform: gc9503v
    id: my_display
    model: PANLEE

    dimensions:
      width: 480
      height: 480

    de_pin:
      number: 40

    hsync_pin:
      number: 42

    vsync_pin:
      number: 41
      allow_other_uses: true

    pclk_pin: 39
    
    enable_pin:
      number: 38
      inverted: false

    reset_pin:
      number: 41
      inverted: false
      allow_other_uses: true

    # ✅ 新版 gc9503v 必填（你缺的）
    sclk_pin:
      number: 45
      allow_other_uses: true

    mosi_pin:
      number: 48
      allow_other_uses: true

    hsync_pulse_width: 10
    hsync_front_porch: 8
    hsync_back_porch: 40

    vsync_pulse_width: 10
    vsync_front_porch: 8
    vsync_back_porch: 40

    data_pins:
      red: [18, 8, 3, 46, 10]
      green: [14, 13, 12, 11, 16, 17]
      blue: 
        - number: 45
          allow_other_uses: true
        - number: 48
          allow_other_uses: true
        - 47
        - 0
        - 21

    color_order: RGB

# --------------------------------------
# TOUCHSCREEN
# --------------------------------------
touchscreen:
  - platform: ft63x6
    i2c_id: bus_a
    interrupt_pin: 4
    id: my_touchscreen

    calibration:
      x_min: 0
      x_max: 480
      y_min: 0
      y_max: 480

    on_touch:
      - logger.log:
          format: Touch at (%d, %d) [%d, %d]
          args: [touch.x, touch.y, touch.x_raw, touch.y_raw]

    on_release:
      - light.turn_on:
          id: display_backlight
          brightness: !lambda 'return id(backlight_brightness).state / 100.0;'

      - if:
          condition: lvgl.is_paused
          then:
            - light.turn_on:
                id: display_backlight
            - lvgl.page.show: main_page_type_a
            - lvgl.resume:
            - lvgl.widget.redraw:


# --------------------------------------
# ANTIBURN
# --------------------------------------
switch:
  - platform: template
    name: Antiburn
    id: switch_antiburn
    icon: mdi:television-shimmer
    optimistic: true
    entity_category: config

    turn_on_action:
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - lvgl.pause:
          show_snow: true

    turn_off_action:
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:


# --------------------------------------
# TIME
# --------------------------------------
time:
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      - hours: 2,3,4,5
        minutes: 5
        seconds: 0
        then:
          - switch.turn_on: switch_antiburn

      - hours: 2,3,4,5
        minutes: 35
        seconds: 0
        then:
          - switch.turn_off: switch_antiburn

  - platform: sntp
    id: my_sntp_time
    timezone: 'Asia/Taipei'
    update_interval: 6h
    servers:
      - time.stdtime.gov.tw
      - time.asia.apple.com
      - time.google.com

    on_time:
      - minutes: /1
        then:
          - lambda: |-
              char buff[8];
              time_t now;
              struct tm timeinfo;
              ::time(&now);
              localtime_r(&now, &timeinfo);
              snprintf(buff, sizeof(buff), "%02d:%02d",
                       timeinfo.tm_hour, timeinfo.tm_min);
              lv_label_set_text(id(local_time), buff);


# --------------------------------------
# BACKLIGHT
# --------------------------------------
output:
  - platform: ledc
    pin: 5
    id: backlight_led
    frequency: 2000Hz

light:
  - platform: monochromatic
    output: backlight_led
    name: "Backlight"
    id: display_backlight
    restore_mode: ALWAYS_ON
    gamma_correct: 1.0


# --------------------------------------
# BRIGHTNESS CONTROL
# --------------------------------------
number:
  - platform: template
    optimistic: true
    id: backlight_brightness
    unit_of_measurement: "%"
    restore_value: true
    initial_value: 50
    min_value: 5
    max_value: 100
    step: 5
    mode: box

    on_value:
      then:
        - lvgl.slider.update:
            id: backlight_slide_brightness
            value: !lambda return x;

        - light.turn_on:
            id: display_backlight
            brightness: !lambda 'return x / 100.0;'


# --------------------------------------
# SCREEN TIMEOUT
# --------------------------------------
  - platform: template
    name: Screen timeout
    optimistic: true
    id: display_timeout
    unit_of_measurement: "s"
    initial_value: 45
    restore_value: true
    min_value: 10
    max_value: 180
    step: 5
    mode: box

    on_value:
      then:
        - lvgl.slider.update:
            id: lvgl_display_timeout
            value: !lambda return x;
